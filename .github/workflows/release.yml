name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Validate tag matches package version
        id: version
        run: |
          version="$(bun -e "const pkg = await import('./package.json', { with: { type: 'json' } }); console.log(pkg.default.version)")"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "Tag v$tag does not match package.json version $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Package source archive
        run: |
          version="${{ steps.version.outputs.version }}"
          git archive \
            --format=tar.gz \
            --prefix="omp-grok-build-${version}/" \
            -o "omp-grok-build-${version}.tar.gz" \
            HEAD

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: omp-grok-build-${{ steps.version.outputs.version }}.tar.gz
